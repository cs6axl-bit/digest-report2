plugins:
  digest_report2_enabled:
    default: true
    client: true

  digest_report2_endpoint_url:
    default: ""
    client: false

  digest_report2_open_tracking_enabled:
    default: false
    client: true

  digest_report2_pixel_force_discourse_domain:
    default: false
    client: false
    type: bool

  digest_report2_message_id_swap_enabled:
    default: false
    client: true

  # Optional: if set, this host is used for BOTH:
  #  - pixel domain
  #  - Message-ID target domain
  # If blank: use domain from the first found <a href="http(s)://..."> link in the email.
  digest_report2_target_domain_override:
    default: ""
    client: true

  # If true, each sent digest is also inserted into a local PostgreSQL table
  # (digest_report_logs). The table is auto-created if missing and the discourse
  # DB user is granted full privileges on it. Independent of the HTTP endpoint switch.
  digest_report2_local_pg_enabled:
    default: false
    client: false
    type: bool
